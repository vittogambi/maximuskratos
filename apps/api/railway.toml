[build]
builder = "NIXPACKS"
buildCommand = "npm install && npm run db:generate && npm run build -w @mk/database && npm run build -w @mk/api"

[deploy]
startCommand = "npm run db:migrate:deploy && npm run start -w @mk/api"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
